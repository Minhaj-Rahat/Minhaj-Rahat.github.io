<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: #fafaf7;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- ARM assembly box -->
<rect x="40" y="30" width="260" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="170" y="55" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">ARM assembly</text>
<text x="170" y="78" text-anchor="middle" font-size="12" fill="#185FA5" font-family="monospace">add r0, r4, r5</text>
<text x="170" y="96" text-anchor="middle" font-size="12" fill="#185FA5" font-family="monospace">sdiv r0, r0, r1</text>
<text x="170" y="114" text-anchor="middle" font-size="12" fill="#185FA5" font-family="monospace">bx lr</text>

<!-- MIPS assembly box -->
<rect x="380" y="30" width="260" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="510" y="55" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">MIPS assembly</text>
<text x="510" y="78" text-anchor="middle" font-size="12" fill="#854F0B" font-family="monospace">addu v0, a0, a1</text>
<text x="510" y="96" text-anchor="middle" font-size="12" fill="#854F0B" font-family="monospace">div v0, v0, 2</text>
<text x="510" y="114" text-anchor="middle" font-size="12" fill="#854F0B" font-family="monospace">jr ra</text>

<!-- Arrows down to ESIL -->
<line x1="170" y1="130" x2="290" y2="180" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="510" y1="130" x2="390" y2="180" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- radare2 label -->
<text x="340" y="165" text-anchor="middle" font-size="11" fill="#888780">radare2</text>

<!-- ESIL box (center, teal) -->
<rect x="160" y="180" width="360" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="205" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">ESIL (common language)</text>
<text x="340" y="230" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="monospace">&lt;REG&gt;,&lt;REG&gt;,+,&lt;REG&gt;,=</text>
<text x="340" y="248" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="monospace">&lt;REG&gt;,&lt;IMM&gt;,/,&lt;REG&gt;,=</text>

<!-- Arrow down to embeddings -->
<line x1="340" y1="260" x2="340" y2="300" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Normalize + tokenize label -->
<text x="410" y="287" text-anchor="start" font-size="11" fill="#888780">normalize + tokenize</text>

<!-- Embedding box (purple) -->
<rect x="160" y="300" width="360" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="325" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Function embedding</text>
<text x="340" y="348" text-anchor="middle" font-size="12" fill="#534AB7">Word2Vec + Transformer</text>
<text x="340" y="366" text-anchor="middle" font-size="12" fill="#534AB7">[0.23, -0.41, 0.87, ..., 0.15]</text>

<!-- Side annotation -->
<text x="340" y="405" text-anchor="middle" font-size="11" fill="#888780">Same source, different CPUs = nearly identical embedding</text>
</svg>
